<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><title>2026 倒计时</title><link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%93%85%3C/text%3E%3C/svg%3E"><style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1a2e;color:#fff;font-family:-apple-system,sans-serif;text-align:center;padding:20px}.card{background:rgba(255,255,255,0.06);border-radius:24px;padding:36px 20px;max-width:360px;width:100%}#cd{font-size:42px;font-weight:800;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.lb{font-size:11px;opacity:0.4;margin-top:20px}.ts{font-size:10px;opacity:0.2;margin-top:16px}</style></head><body><div class="card"><h1>&#x1F4C5; 2026 倒计时</h1><p style="opacity:0.5;font-size:13px">距 2027 年还剩</p><div id="cd"><span id="m">--</span>月 <span id="d">--</span>天 <span id="h">--</span>时 <span id="n">--</span>分 <span id="s">--</span>秒</div><div class="lb">&#x25CF; 每秒跳动 &#x25CF;</div><div class="ts">Safari 分享 &#x2192; 添加到主屏幕</div></div><script>function u(){var n=new Date(),o=new Date(2027,0,1),f=o-n;var x=f%864e5;document.getElementById("s").textContent=String(Math.floor(x%6e4/1e3)).padStart(2,"0");document.getElementById("n").textContent=String(Math.floor(x%36e5/6e4)).padStart(2,"0");document.getElementById("h").textContent=String(Math.floor(x/36e5)).padStart(2,"0");document.getElementById("d").textContent=String(Math.floor(f/864e5)).padStart(2,"0");var d2=new Date(n),m=0;for(;new Date(d2.getFullYear(),d2.getMonth()+1,1)<o;){m++;d2=new Date(d2.getFullYear(),d2.getMonth()+1,1)}document.getElementById("m").textContent=String(m).padStart(2,"0");}u();setInterval(u,1000);</script></body></html>
