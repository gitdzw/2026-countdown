<html lang="zh-CN">
<head>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px; -webkit-font-smoothing: antialiased;
  }
  .card {
    background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px; padding: 36px 28px; max-width: 400px; width: 100%;
    box-shadow: 0 25px 80px rgba(0,0,0,0.3); text-align: center;
  }
  .icon { font-size: 52px; margin-bottom: 10px; }
  h1 { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 2px; }
  .subtitle { font-size: 14px; color: #86868b; margin-bottom: 20px; }

  .countdown-box {
    background: linear-gradient(135deg, #667eea22 0%, #764ba222 100%);
    border: 1px solid #667eea33;
    border-radius: 16px; padding: 20px 16px; margin-bottom: 24px;
  }
  .countdown-label { font-size: 12px; color: #888; margin-bottom: 8px; letter-spacing: 2px; }
  .cd-row { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
  .cd-unit {
    display: flex; flex-direction: column; align-items: center;
    min-width: 56px;
  }
  .cd-num {
    font-size: 32px; font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2; font-variant-numeric: tabular-nums;
  }
  .cd-label {
    font-size: 11px; color: #999; margin-top: 2px;
  }
  .cd-sep {
    font-size: 28px; color: #ccc; align-self: center; padding-bottom: 14px;
  }

  .total-days {
    font-size: 13px; color: #888; margin-top: 8px;
  }
  .total-days strong { color: #667eea; font-weight: 700; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 16px 24px; font-size: 17px; font-weight: 600;
    border: none; border-radius: 14px; cursor: pointer;
    transition: all 0.2s; text-decoration: none; -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; margin-bottom: 10px;
  }
  .btn-secondary {
    background: #f5f5f7; color: #333; margin-bottom: 10px;
  }
  .btn-secondary:active { background: #e8e8ed; }

  .steps { text-align: left; margin-top: 20px; }
  .step {
    display: flex; gap: 10px; align-items: flex-start;
    margin-bottom: 12px; font-size: 14px; color: #444; line-height: 1.4;
  }
  .step-num {
    background: #f0f0f5; border-radius: 50%;
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #667eea; flex-shrink: 0; margin-top: 1px;
  }
  .note {
    font-size: 12px; color: #aaa; margin-top: 14px; line-height: 1.5;
    padding: 10px; background: #fafafa; border-radius: 10px;
  }

    .card { background: rgba(30,30,40,0.95); }

    .cd-sep { color: #555; }
    .cd-label { color: #777; }
    .total-days { color: #777; }
  }

<script>
// 实时倒计时更新
function updateCountdown() {
  const now = new Date();
  const target = new Date(now.getFullYear() + 1, 0, 1); // Jan 1 next year 00:00

  const diff = target - now;
  if (diff <= 0) {
    document.getElementById('cd-months').textContent = '00';
    document.getElementById('cd-days').textContent = '00';
    document.getElementById('cd-hours').textContent = '00';
    document.getElementById('cd-minutes').textContent = '00';
    document.getElementById('cd-seconds').textContent = '00';
    document.getElementById('totalDays').textContent = '0';
    return;
  }

  const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
  document.getElementById('totalDays').textContent = totalDays.toLocaleString();

  // Compute months, days, hours, minutes, seconds
  let d = new Date(now);
  let months = 0;
  
  // Count remaining months
  while (true) {
    let nextMonth = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    if (nextMonth < target) {
      months++;
      d = nextMonth;
    } else {
      break;
    }
  }

  // Remaining days after months
  const afterMonths = new Date(d);
  const remainingMs = target - afterMonths;
  const days = Math.floor(remainingMs / (1000 * 60 * 60 * 24));
  const hours = Math.floor((remainingMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((remainingMs % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((remainingMs % (1000 * 60)) / 1000);

  document.getElementById('cd-months').textContent = String(months).padStart(2, '0');
  document.getElementById('cd-days').textContent = String(days).padStart(2, '0');
  document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
  document.getElementById('cd-minutes').textContent = String(minutes).padStart(2, '0');
  document.getElementById('cd-seconds').textContent = String(seconds).padStart(2, '0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
