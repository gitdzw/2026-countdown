<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>2026 倒计时</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%93%85%3C/text%3E%3C/svg%3E">
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;
  font-family:-apple-system,sans-serif;text-align:center;padding:20px;
  -webkit-font-smoothing:antialiased;}
.card{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:24px;padding:36px 24px;max-width:360px;width:100%;}
h1{font-size:22px;margin:0 0 4px 0;font-weight:700}
.sub{font-size:13px;opacity:0.5;margin:0 0 20px 0}
.num{font-size:40px;font-weight:800;margin:0;
  background:linear-gradient(135deg,#00d2ff,#3a7bd5,#00d2ff);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shine 2s linear infinite;
  font-variant-numeric:tabular-nums;letter-spacing:1px;line-height:1.2}
@keyframes shine{0%{background-position:0% center}100%{background-position:200% center}}
.lbl{font-size:9px;opacity:0.35;text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.row{display:flex;justify-content:center;gap:0;margin-bottom:4px}
.u{display:flex;flex-direction:column;align-items:center;min-width:44px}
.sep{font-size:34px;opacity:0.15;align-self:center;padding-bottom:12px;font-weight:200;min-width:10px}
.p{font-size:13px;opacity:0.4;margin:12px 0 0 0}
.p strong{opacity:1;color:#00d2ff}
.bar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:14px;overflow:hidden}
.fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#00d2ff,#3a7bd5);width:0%}
.ft{font-size:10px;opacity:0.2;margin-top:16px}
</style>
</head>
<body>
<div class="card">
<h1>&#x1F4C5; 2026 倒计时</h1>
<p class="sub">距离 2027 年还有</p>
<div class="row">
  <div class="u"><span class="num" id="m">--</span><span class="lbl">月</span></div>
  <span class="sep">:</span>
  <div class="u"><span class="num" id="d">--</span><span class="lbl">天</span></div>
  <span class="sep">:</span>
  <div class="u"><span class="num" id="h">--</span><span class="lbl">时</span></div>
  <span class="sep">:</span>
  <div class="u"><span class="num" id="i">--</span><span class="lbl">分</span></div>
  <span class="sep">:</span>
  <div class="u"><span class="num" id="s">--</span><span class="lbl">秒</span></div>
</div>
<p class="p">已过 <strong id="pct">0</strong>% &#x2022; 剩 <strong id="days">--</strong> 天</p>
<div class="bar"><div class="fill" id="fill"></div></div>
<p class="ft">Safari 分享 &#x1F4E4; &#x2192; 添加到主屏幕</p>
</div>
<script>
function u(){
  var n=new Date(),y=n.getFullYear(),t=new Date(y,0,1),o=new Date(y+1,0,1);
  var p=(n-t)/(o-t)*100;document.getElementById('pct').textContent=p.toFixed(1);
  document.getElementById('fill').style.width=p+'%';
  var f=o-n;document.getElementById('days').textContent=Math.floor(f/864e5).toLocaleString();
  var d=new Date(n),m=0;for(;new Date(d.getFullYear(),d.getMonth()+1,1)<o;){m++;d=new Date(d.getFullYear(),d.getMonth()+1,1)}
  var r=o-d,x=r%864e5;
  document.getElementById('s').textContent=String(Math.floor(x%6e4/1e3)).padStart(2,'0');
  document.getElementById('i').textContent=String(Math.floor(x%36e5/6e4)).padStart(2,'0');
  document.getElementById('h').textContent=String(Math.floor(x/36e5)).padStart(2,'0');
  document.getElementById('d').textContent=String(Math.floor(r/864e5)).padStart(2,'0');
  document.getElementById('m').textContent=String(m).padStart(2,'0');
}
u();setInterval(u,200);
</script>
</body>
</html>
