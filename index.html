<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><title>2026 倒计时</title></head><body style="margin:0;background:#1a1a2e;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif;text-align:center;padding:20px"><div style="background:rgba(255,255,255,0.06);border-radius:24px;padding:36px;max-width:360px;width:100%"><h1>📅 2026 倒计时</h1><p style="opacity:.5">距离 2027 年还有</p><div style="font-size:40px;font-weight:800;font-variant-numeric:tabular-nums"><span id="m">--</span>月 <span id="d">--</span>天 <span id="h">--</span>时 <span id="n">--</span>分 <span id="s">--</span>秒</div><p style="opacity:.2;font-size:10px;margin-top:20px">Safari 分享 → 添加到主屏幕</p></div><script>setInterval(function(){var n=new Date(),o=new Date(2027,0,1),f=o-n,x=f%864e5;document.getElementById("s").innerHTML=String(Math.floor(x%6e4/1e3)).padStart(2,"0");document.getElementById("n").innerHTML=String(Math.floor(x%36e5/6e4)).padStart(2,"0");document.getElementById("h").innerHTML=String(Math.floor(x/36e5)).padStart(2,"0");document.getElementById("d").innerHTML=String(Math.floor(f/864e5)).padStart(2,"0");var g=new Date(n),m=0;for(;new Date(g.getFullYear(),g.getMonth()+1,1)<o;){m++;g=new Date(g.getFullYear(),g.getMonth()+1,1)}document.getElementById("m").innerHTML=String(m).padStart(2,"0");},1000);</script></body></html>
